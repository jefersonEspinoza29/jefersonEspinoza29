name: Metrics

on:
  schedule:
    - cron: "0 2 * * *"   # cada día a las 2am
  workflow_dispatch:        # ejecución manual
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Métricas izquierda: hábitos + lenguajes + topics ──
      - name: Metrics (left)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-left.svg
          user: jefersonEspinoza29
          template: classic
          base: ""
          config_timezone: America/Lima
          config_display: large

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 6
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_recent_days: 14
          plugin_languages_threshold: "0%"

          plugin_topics: yes
          plugin_topics_limit: 24
          plugin_topics_mode: icons
          plugin_topics_sort: stars

      # ── Métricas derecha: calendario + racha ──
      - name: Metrics (right)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-right.svg
          user: jefersonEspinoza29
          template: classic
          base: header
          config_timezone: America/Lima
          config_display: large

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_colors: github
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_threshold: "0%"
